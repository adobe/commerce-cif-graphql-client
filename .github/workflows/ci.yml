name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - graphql-client-*

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build
        run: |
          java -version
          mvn -v
          mvn -B clean install

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/**/*.xml
          check_name: Unit Test Results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/graphql-client-')
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import

      - name: Deploy to Maven Central
        # Only performs a 'mvn deploy' after 'mvn release:prepare' because the workflow
        # already checks out the git tag like 'mvn release:perform' would do.
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: mvn -B -s .github/maven/settings.xml clean deploy -P release-sign-artifacts

      - name: Remove GPG key
        if: always()
        run: rm -rf ~/.gnupg
