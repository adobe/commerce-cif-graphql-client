name: build-and-release

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        run: |
          java -version
          mvn -v
          mvn -B clean install

      - name: Generate test files report
        if: always()
        run: |
          report="test-files-report.md"
          {
            echo "## Test results by test class (Java file)"
            echo ""
            echo "| # | Test class (Java file) | Tests | Failures | Errors | Skipped | Status |"
            echo "|--:|---|--:|--:|--:|--:|---|"
          } > "$report"
          file_count=0
          passed_files=0
          failed_files=0
          total_tests=0
          total_failures=0
          total_errors=0
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            file_count=$((file_count + 1))
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            skipped=$(echo "$attrs" | sed -n 's/.* skipped="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            skipped=${skipped:-0}
            total_tests=$((total_tests + tests))
            total_failures=$((total_failures + failures))
            total_errors=$((total_errors + errors))
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              status="FAILED"
              failed_files=$((failed_files + 1))
            else
              status="PASSED"
              passed_files=$((passed_files + 1))
            fi
            echo "| ${file_count} | \`${class}\` | ${tests} | ${failures} | ${errors} | ${skipped} | ${status} |" >> "$report"
          done
          {
            echo ""
            echo "**Summary:** ${file_count} test files — ${passed_files} passed, ${failed_files} failed — ${total_tests} test methods (${total_failures} failures, ${total_errors} errors)"
            echo ""
            echo "### Passed test files"
            echo ""
          } >> "$report"
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            if [ "$failures" = "0" ] && [ "$errors" = "0" ]; then
              echo "- \`${class}\` (${tests} tests)" >> "$report"
            fi
          done
          {
            echo ""
            echo "### Failed test files"
            echo ""
          } >> "$report"
          failed_list=0
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            failures=${failures:-0}
            errors=${errors:-0}
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              failed_list=1
              tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
              tests=${tests:-0}
              echo "- \`${class}\` (${tests} tests, ${failures} failures, ${errors} errors)" >> "$report"
            fi
          done
          if [ "$failed_list" -eq 0 ]; then
            echo "No failed test files." >> "$report"
          fi
          {
            echo ""
            echo "### Failed test methods"
            echo ""
          } >> "$report"
          failed_methods=0
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            while IFS= read -r testcase; do
              name=$(echo "$testcase" | sed -n 's/.* name="\([^"]*\)".*/\1/p')
              if echo "$testcase" | grep -q '<failure\|<error'; then
                failed_methods=1
                echo "- \`${class}.${name}\`" >> "$report"
              fi
            done < <(grep '<testcase ' "$xml" || true)
          done
          if [ "$failed_methods" -eq 0 ]; then
            echo "No failed test methods." >> "$report"
          fi
          cat "$report" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML test report
        if: always()
        run: mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only

      - name: Upload Surefire XML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-html-report
          path: target/site/surefire-report.html
          retention-days: 14

      - name: Upload JaCoCo HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
