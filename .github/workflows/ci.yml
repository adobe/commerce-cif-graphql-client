name: github-actions

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        id: build
        run: |
          mkdir -p target
          start_time=$(date +%s)
          {
            echo "## Build environment"
            java -version 2>&1
            mvn -v
          } | tee target/build-log.txt
          mvn -B clean install
          end_time=$(date +%s)
          echo "duration=$((end_time - start_time))" >> "$GITHUB_OUTPUT"
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Prepare test reports
        if: success()
        run: |
          mkdir -p build-reports/surefire-reports build-reports/jacoco
          cp -r target/surefire-reports/. build-reports/surefire-reports/
          if [ -d target/site/jacoco ]; then
            cp -r target/site/jacoco/. build-reports/jacoco/
          fi
          mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html build-reports/
          fi

          total_tests=0
          file_count=0
          passed_files=0
          failed_files=0
          test_table="| Status | Test class (Java file) | Tests | Failures | Errors |"
          test_table="${test_table}\n|---|---|--:|--:|--:|"

          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            file_count=$((file_count + 1))
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            total_tests=$((total_tests + tests))
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              status="FAILED"
              failed_files=$((failed_files + 1))
            else
              status="PASSED"
              passed_files=$((passed_files + 1))
            fi
            test_table="${test_table}\n| ${status} | \`${class}\` | ${tests} | ${failures} | ${errors} |"
          done

          echo "${total_tests}" > build-reports/.total-tests
          echo "${file_count}" > build-reports/.file-count
          echo "${passed_files}" > build-reports/.passed-files
          echo "${failed_files}" > build-reports/.failed-files
          echo -e "$test_table" > build-reports/test-summary.md

      - name: Upload build-reports
        id: reports
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: build-reports
          path: build-reports/
          if-no-files-found: error
          retention-days: 14

      - name: Publish summary
        if: always()
        run: |
          if [ -f build-reports/.total-tests ]; then
            total_tests=$(cat build-reports/.total-tests)
            file_count=$(cat build-reports/.file-count)
            passed_files=$(cat build-reports/.passed-files)
            failed_files=$(cat build-reports/.failed-files)
          else
            total_tests=0
            file_count=0
            passed_files=0
            failed_files=0
          fi

          {
            echo "<details open>"
            echo "<summary><strong>Test Results</strong> — ${total_tests} tests · ${file_count} files · ${failed_files} failed</summary>"
            echo ""
            if [ -f build-reports/test-summary.md ]; then
              cat build-reports/test-summary.md
            else
              echo "Build did not complete — no test results."
            fi
            echo "</details>"
          } > "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
