name: github-actions

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        id: build
        run: |
          mkdir -p target
          start_time=$(date +%s)
          {
            echo "## Build environment"
            java -version 2>&1
            mvn -v
          } | tee target/build-log.txt
          mvn -B clean install
          end_time=$(date +%s)
          echo "duration=$((end_time - start_time))" >> "$GITHUB_OUTPUT"
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Prepare test reports
        if: always()
        run: |
          if [ ! -d target/surefire-reports ]; then
            echo "No surefire reports found."
            exit 0
          fi
          mkdir -p build-reports/surefire-reports build-reports/jacoco
          cp -r target/surefire-reports/. build-reports/surefire-reports/
          if [ -d target/site/jacoco ]; then
            cp -r target/site/jacoco/. build-reports/jacoco/
          fi
          mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html build-reports/
          fi

          python3 <<'PY'
          import glob
          import os
          import re
          import xml.etree.ElementTree as ET

          surefire_dir = "target/surefire-reports"
          total_tests = 0
          file_count = 0
          passed_files = 0
          failed_files = 0
          failed_cases = []
          table_rows = []

          def classname_to_source(classname):
              return "src/test/java/" + classname.replace(".", "/") + ".java"

          def extract_failure_detail(testcase):
              for tag in ("failure", "error", "rerunFailure", "rerunError", "flakyFailure", "flakyError"):
                  elem = testcase.find(tag)
                  if elem is None:
                      continue
                  message = elem.get("message") or ""
                  body = (elem.text or "").strip()
                  stack = elem.findtext("stackTrace", default="").strip()
                  detail = body or stack or message
                  if message and message not in detail:
                      detail = f"{message}\n{detail}".strip()
                  kind = "ERROR" if tag in ("error", "rerunError", "flakyError") else "FAILURE"
                  return kind, message, detail
              return None, "", ""

          def parse_location(classname, detail):
              path = classname_to_source(classname)
              match = re.search(r"\((\w+\.java):(\d+)\)", detail)
              if match:
                  filename, line = match.group(1), match.group(2)
                  if path.endswith("/" + filename):
                      return path, line
              return path, ""

          for xml_path in sorted(glob.glob(os.path.join(surefire_dir, "TEST-*.xml"))):
              file_count += 1
              classname = os.path.basename(xml_path)[len("TEST-"):-len(".xml")]
              root = ET.parse(xml_path).getroot()
              tests = int(root.get("tests", "0"))
              failures = int(root.get("failures", "0"))
              errors = int(root.get("errors", "0"))
              total_tests += tests

              if failures or errors:
                  status = "FAILED"
                  failed_files += 1
              else:
                  status = "PASSED"
                  passed_files += 1

              table_rows.append(
                  f"| {status} | `{classname}` | {tests} | {failures} | {errors} |"
              )

              for testcase in root.findall("testcase"):
                  kind, message, detail = extract_failure_detail(testcase)
                  if not kind:
                      continue
                  name = testcase.get("name", "")
                  tc_class = testcase.get("classname", classname)
                  source_file, line = parse_location(tc_class, detail)
                  failed_cases.append(
                      {
                          "name": name,
                          "classname": tc_class,
                          "kind": kind,
                          "message": message,
                          "detail": detail,
                          "source_file": source_file,
                          "line": line,
                      }
                  )

          os.makedirs("build-reports", exist_ok=True)
          with open("build-reports/.total-tests", "w", encoding="utf-8") as f:
              f.write(str(total_tests))
          with open("build-reports/.file-count", "w", encoding="utf-8") as f:
              f.write(str(file_count))
          with open("build-reports/.passed-files", "w", encoding="utf-8") as f:
              f.write(str(passed_files))
          with open("build-reports/.failed-files", "w", encoding="utf-8") as f:
              f.write(str(failed_files))
          with open("build-reports/.failed-cases", "w", encoding="utf-8") as f:
              f.write(str(len(failed_cases)))

          lines = []
          if failed_cases:
              lines.append(f"### Failed tests ({len(failed_cases)})")
              lines.append("")
              for case in failed_cases:
                  lines.append(f"#### `{case['name']}`")
                  lines.append(f"**Class:** `{case['classname']}`")
                  lines.append("")
                  lines.append("```")
                  lines.append(case["detail"] or case["message"] or case["kind"])
                  lines.append("```")
                  lines.append("")

          lines.append("### All test classes")
          lines.append("")
          lines.append("| Status | Test class (Java file) | Tests | Failures | Errors |")
          lines.append("|---|---|--:|--:|--:|")
          lines.extend(table_rows)

          with open("build-reports/test-summary.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")

          with open("build-reports/test-annotations.txt", "w", encoding="utf-8") as f:
              for case in failed_cases:
                  title = f"{case['name']} ({case['kind'].lower()})"
                  msg = (case["message"] or case["detail"] or case["kind"]).replace("%", "%25").replace("\r", "")
                  msg = msg.replace("\n", "%0A")
                  line = f",line={case['line']}" if case["line"] else ""
                  f.write(
                      f"::error file={case['source_file']}{line},title={title}::{msg}\n"
                  )
          PY

      - name: Annotate test failures
        if: always() && hashFiles('build-reports/test-annotations.txt') != ''
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            echo "$line"
          done < build-reports/test-annotations.txt

      - name: Publish summary
        if: always()
        run: |
          if [ -f build-reports/.total-tests ]; then
            total_tests=$(cat build-reports/.total-tests)
            file_count=$(cat build-reports/.file-count)
            passed_files=$(cat build-reports/.passed-files)
            failed_files=$(cat build-reports/.failed-files)
            failed_cases=$(cat build-reports/.failed-cases 2>/dev/null || echo 0)
          else
            total_tests=0
            file_count=0
            passed_files=0
            failed_files=0
            failed_cases=0
          fi

          {
            echo "<details open>"
            if [ "${failed_cases}" != "0" ]; then
              echo "<summary><strong>Test Results</strong> — ${total_tests} tests · ${failed_cases} failed testcase(s) · ${failed_files} failed file(s)</summary>"
            else
              echo "<summary><strong>Test Results</strong> — ${total_tests} tests · ${file_count} files · all passed</summary>"
            fi
            echo ""
            if [ -f build-reports/test-summary.md ]; then
              cat build-reports/test-summary.md
            elif [ -d target/surefire-reports ]; then
              echo "Tests ran but summary was not generated."
            else
              echo "Build failed before tests ran."
            fi
            echo "</details>"
          } > "$GITHUB_STEP_SUMMARY"

      - name: Upload build-reports
        id: reports
        if: always() && hashFiles('build-reports/surefire-reports/**') != ''
        uses: actions/upload-artifact@v6
        with:
          name: build-reports
          path: build-reports/
          if-no-files-found: error
          retention-days: 14

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v6
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
