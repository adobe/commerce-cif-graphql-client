name: github-actions

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        id: build
        run: |
          {
            echo "## Build environment"
            java -version 2>&1
            mvn -v
          } | tee build-log.txt
          mvn -B clean install
          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Tests and summary
        if: always()
        run: |
          mkdir -p build-output/surefire-reports
          cp -r target/surefire-reports/. build-output/surefire-reports/

          total_tests=0
          total_failures=0
          total_errors=0
          file_count=0
          passed_files=0
          failed_files=0

          test_table="| Status | Test class (Java file) | Tests | Failures | Errors |"
          test_table="${test_table}\n|---|---|--:|--:|--:|"

          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            file_count=$((file_count + 1))
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            total_tests=$((total_tests + tests))
            total_failures=$((total_failures + failures))
            total_errors=$((total_errors + errors))
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              status="FAILED"
              failed_files=$((failed_files + 1))
            else
              status="PASSED"
              passed_files=$((passed_files + 1))
            fi
            test_table="${test_table}\n| ${status} | \`${class}\` | ${tests} | ${failures} | ${errors} |"
          done

          if [ "${{ steps.build.outcome }}" = "success" ]; then
            build_status="SUCCESS"
          else
            build_status="FAILED"
          fi

          {
            echo "# github-actions build report"
            echo ""
            echo "> Click **Summary** in the left sidebar for this page. PR checks open the build log by default."
            echo ""
            echo "<details>"
            echo "<summary><strong>Build</strong> — ${build_status}</summary>"
            echo ""
            echo "\`\`\`"
            cat build-log.txt
            echo "mvn clean install: ${build_status}"
            echo "\`\`\`"
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary><strong>Test Results</strong> — ${total_tests} tests, ${passed_files} files passed, ${failed_files} files failed</summary>"
            echo ""
            echo "**${total_tests} tests** in **${file_count} files** — **${passed_files} passed**, **${failed_files} failed**"
            echo ""
            echo -e "$test_table"
            echo "</details>"
            echo ""
            echo "<details>"
            echo "<summary><strong>Artifacts</strong> — download from the Artifacts section below</summary>"
            echo ""
            echo "| Artifact | Contents |"
            echo "|---|---|"
            echo "| \`surefire-reports\` | JUnit XML files + test-summary.md + HTML report |"
            echo "| \`jacoco-html-report\` | Code coverage HTML report |"
            echo ""
            echo "Files in surefire-reports artifact:"
            echo "\`\`\`"
            find build-output -type f | sort
            echo "\`\`\`"
            echo "</details>"
          } > "$GITHUB_STEP_SUMMARY"

          echo -e "$test_table" > build-output/test-summary.md
          echo "::notice title=Tests::${total_tests} tests in ${file_count} files (${failed_files} failed)"

      - name: Generate HTML test report
        if: always()
        run: |
          mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html build-output/
          fi

      - name: Upload surefire-reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: surefire-reports
          path: build-output/
          if-no-files-found: error
          retention-days: 14

      - name: Upload jacoco-html-report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
