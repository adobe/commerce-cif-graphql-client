name: github-actions

on:
  pull_request:
  push:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        run: mvn -B clean install

      - name: Test report (click this step to see pass/fail list)
        if: always()
        run: |
          mkdir -p build-output/surefire-reports
          cp -r target/surefire-reports/. build-output/surefire-reports/
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html build-output/
          fi

          total_tests=0
          total_failures=0
          total_errors=0
          file_count=0
          passed_files=0
          failed_files=0

          echo "============================================================"
          echo "  TEST RESULTS"
          echo "============================================================"
          printf "%-8s %-70s %s\n" "STATUS" "TEST CLASS (JAVA FILE)" "TESTS"
          echo "------------------------------------------------------------"

          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            file_count=$((file_count + 1))
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            total_tests=$((total_tests + tests))
            total_failures=$((total_failures + failures))
            total_errors=$((total_errors + errors))
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              status="FAILED"
              failed_files=$((failed_files + 1))
            else
              status="PASSED"
              passed_files=$((passed_files + 1))
            fi
            printf "%-8s %-70s %s\n" "$status" "$class" "$tests"
          done

          echo "------------------------------------------------------------"
          echo "TOTAL:   ${total_tests} tests in ${file_count} files"
          echo "PASSED:  ${passed_files} files"
          echo "FAILED:  ${failed_files} files"
          echo "ERRORS:  ${total_errors} test errors"
          echo "============================================================"

          {
            echo "# Test results"
            echo ""
            echo "**${total_tests} tests** in **${file_count} files** — **${passed_files} passed**, **${failed_files} failed**"
            echo ""
            echo "| Status | Test class (Java file) | Tests |"
            echo "|---|---|--:|"
          } > build-output/test-summary.md

          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              row_status="FAILED"
            else
              row_status="PASSED"
            fi
            echo "| ${row_status} | \`${class}\` | ${tests} |" >> build-output/test-summary.md
          done

          cp build-output/test-summary.md "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Tests::${total_tests} tests passed in ${file_count} files (${failed_files} failed)"

          echo "Files packaged for artifact upload:"
          find build-output -type f | sort

      - name: Generate HTML test report
        if: always()
        run: |
          mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only
          if [ -f target/site/surefire-report.html ]; then
            cp target/site/surefire-report.html build-output/
          fi

      - name: Upload surefire-reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: build-output/
          if-no-files-found: error
          retention-days: 14

      - name: Upload JaCoCo HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
