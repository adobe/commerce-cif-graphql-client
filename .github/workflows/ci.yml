name: CI

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        run: |
          java -version
          mvn -v
          mvn -B clean install

      - name: Write test summary by file
        if: always()
        run: |
          echo "## Test results by test class (Java file)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test class | Tests | Failures | Errors | Skipped | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|---:|---:|---|" >> "$GITHUB_STEP_SUMMARY"
          total_tests=0
          total_failures=0
          total_errors=0
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            attrs=$(grep -m1 '<testsuite ' "$xml" || true)
            tests=$(echo "$attrs" | sed -n 's/.* tests="\([^"]*\)".*/\1/p')
            failures=$(echo "$attrs" | sed -n 's/.* failures="\([^"]*\)".*/\1/p')
            errors=$(echo "$attrs" | sed -n 's/.* errors="\([^"]*\)".*/\1/p')
            skipped=$(echo "$attrs" | sed -n 's/.* skipped="\([^"]*\)".*/\1/p')
            tests=${tests:-0}
            failures=${failures:-0}
            errors=${errors:-0}
            skipped=${skipped:-0}
            total_tests=$((total_tests + tests))
            total_failures=$((total_failures + failures))
            total_errors=$((total_errors + errors))
            if [ "$failures" != "0" ] || [ "$errors" != "0" ]; then
              status="FAILED"
            else
              status="PASSED"
            fi
            echo "| \`${class}\` | ${tests} | ${failures} | ${errors} | ${skipped} | ${status} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total:** ${total_tests} tests, ${total_failures} failures, ${total_errors} errors" >> "$GITHUB_STEP_SUMMARY"

      - name: List failed tests
        if: always()
        run: |
          failed=0
          echo "## Failed test methods" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for xml in target/surefire-reports/TEST-*.xml; do
            [ -f "$xml" ] || continue
            class=$(basename "$xml" .xml | sed 's/^TEST-//')
            while IFS= read -r testcase; do
              name=$(echo "$testcase" | sed -n 's/.* name="\([^"]*\)".*/\1/p')
              if echo "$testcase" | grep -q '<failure\|<error'; then
                failed=1
                echo "- \`${class}.${name}\`" >> "$GITHUB_STEP_SUMMARY"
              fi
            done < <(grep '<testcase ' "$xml" || true)
          done
          if [ "$failed" -eq 0 ]; then
            echo "No failed tests." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate HTML test report
        if: always()
        run: mvn -B org.apache.maven.plugins:maven-surefire-report-plugin:3.0.0-M3:report-only

      - name: Publish test results to PR
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml
          check_name: Maven Test Results
          comment_mode: always
          comment_title: Test Results (${{ job.status }})
          check_run_annotations: all tests
          report_suite_logs: any
          action_fail: false

      - name: Upload Surefire XML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-html-report
          path: target/site/surefire-report.html
          retention-days: 14

      - name: Upload JaCoCo HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/graphql-client-')
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Deploy to Maven Central
        # Only performs 'mvn deploy' (not release:perform) because this job
        # already checks out the release tag.
        run: mvn -B -s .github/maven/settings.xml clean deploy -P release-sign-artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Remove GPG keyring
        if: always()
        run: rm -rf ~/.gnupg
