name: github-actions

# Same workflow name as CircleCI — only triggered by release tags.
on:
  push:
    tags:
      - 'graphql-client-*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: github-actions-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build
        run: mvn -B clean install

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    environment: maven-central

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Import GPG key
        run: echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Deploy to Maven Central
        run: mvn -B -s .github/maven/settings.xml clean deploy -P release-sign-artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Remove GPG keyring
        if: always()
        run: rm -rf ~/.gnupg
